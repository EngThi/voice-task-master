<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>VTM // Permission Required</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; text-align: center; margin: 0; padding: 20px; box-sizing: border-box; }
    .hero { font-size: 32px; margin-bottom: 20px; text-shadow: 0 0 20px var(--accent); font-family: monospace; font-weight: bold; }
    p { font-family: monospace; color: var(--muted); margin-bottom: 30px; }

</head>
<body>
  <div class="hero">> SYSTEM_UPLINK_REQUIRED</div>

  <div id="status" style="margin-top: 20px; font-family: monospace; color: #ffcc00;"></div>
  <script src="permissions.js"></script>

</html>
