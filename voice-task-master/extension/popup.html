<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Voice Task Master</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="title">VOICE-TASK-MASTER v1.1</div>
      <div class="subtitle">Neural Uplink Connected // Status: Online</div>
    </header>

    <section class="panel">
      <div class="row">
        <button id="btnVoice" class="btn primary">🎙️ Initialize Voice</button>
        <button id="btnStandup" class="btn">🧠 Status Briefing</button>
      </div>

      <div class="row">
        <input id="taskText" class="input" placeholder="Type command or speak..." />
      </div>

      <div class="row">
        <input id="taskDue" class="input small" type="date" />
        <button id="btnAdd" class="btn primary">Insert Task</button>
      </div>

      <div id="filterBar" class="filter-bar" style="margin: 10px 0; display: flex; gap: 5px; overflow-x: auto;">
        <div class="tag-btn active" data-tag="all" onclick="window.setFilter('all')">ALL</div>
        <div class="tag-btn" data-tag="vtm" onclick="window.setFilter('vtm')">#VTM</div>
        <div class="tag-btn" data-tag="ship" onclick="window.setFilter('ship')">#SHIP</div>
        <div class="tag-btn" onclick="window.toggleImport()" style="border-style: dashed;">[Import]</div>
      </div>

      <textarea id="importArea" class="input" style="display:none; height: 60px; font-size: 10px;" placeholder="Paste tasks here..."></textarea>
      <button id="btnDoImport" class="btn" style="display:none; margin-top: 5px;">Process Batch</button>

      <div class="row">
        <button id="btnExport" class="btn">Data Export</button>
        <button id="btnClearDone" class="btn danger">Purge Done</button>
      </div>

      <div class="hint" id="hint">System initialized. Waiting for command...</div>
    </section>

    <section class="list">
      <div class="listHeader">
        <div>Active Tasks</div>
        <div id="count"></div>
      </div>
      <div id="tasks" class="task-list"></div>
    </section>

    <footer>
      <div class="kbd">
        <span>Enter</span> add • <span>Ctrl</span>+<span>K</span> focus
      </div>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
