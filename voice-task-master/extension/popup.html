<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Voice Task Master</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="title">VOICE-TASK-MASTER v1.0</div>
      <div class="subtitle">Neural Uplink Connected // Status: Online</div>
    </header>

    <section class="panel">
      <div class="row">
        <button id="btnVoice" class="btn primary">🎙️ Initialize Voice</button>
        <button id="btnStandup" class="btn">🧠 Status Briefing</button>
      </div>

      <div class="row">
        <input id="taskText" class="input" placeholder="Type command or speak..." />
      </div>

      <div class="row">
        <input id="taskDue" class="input small" type="date" />
        <button id="btnAdd" class="btn primary">Insert Task</button>
      </div>

      <div class="row">
        <button id="btnExport" class="btn">Data Export</button>
        <button id="btnClearDone" class="btn danger">Purge Done</button>
      </div>

      <div class="hint" id="hint">System initialized. Waiting for command...</div>
    </section>

    <section class="list">
      <div class="listHeader">
        <div>Tasks</div>
        <div id="count"></div>
      </div>
      <div id="tasks"></div>
    </section>

    <footer>
      <div class="kbd">
        <span>Enter</span> add • <span>Ctrl</span>+<span>K</span> focus
      </div>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
