<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Voice Task Master</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="title">VOICE-TASK-MASTER v1.1.2</div>
      <div class="subtitle">Universal Ship Bridge // Status: Online</div>
    </header>

    <section class="panel">
      <div class="row">
        <button id="btnVoice" class="btn primary">🎙️ Initialize Voice</button>
        <button id="btnStandup" class="btn">🧠 Status Briefing</button>
      </div>

      <div class="row">
        <input id="taskText" class="input" placeholder="Neural command (add/remove...)" />
      </div>

      <div class="row">
        <input id="taskDue" class="input small" type="date" />
        <button id="btnAdd" class="btn primary">Insert Task</button>
      </div>

      <!-- Dynamic Project Filter — onclick removido, wired via popup.js -->
      <div id="filterBar" class="filter-bar" style="margin: 10px 0; display: flex; gap: 5px;">
        <div class="tag-btn active" data-tag="all">ALL</div>
        <div class="tag-btn" data-tag="project" style="display:none;">#PROJECT</div>
      </div>

      <div class="row">
        <button id="btnExport" class="btn">Data Export</button>
        <button id="btnClearDone" class="btn danger">Purge Done</button>
      </div>

      <div class="hint" id="hint">System synchronized with active tab.</div>
    </section>

    <section class="list">
      <div class="listHeader">
        <div id="count">0/0 in view</div>
      </div>
      <div id="tasks" class="task-list"></div>
    </section>

    <footer>
      <div class="kbd">
        <span>Enter</span> add • <span>Ctrl</span>+<span>K</span> focus
      </div>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
