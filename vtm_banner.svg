<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="400" fill="#05070a" />
  
  <!-- CRT Scanlines Effect -->
  <defs>
    <pattern id="scanlines" width="1200" height="4" patternUnits="userSpaceOnUse">
      <rect width="1200" height="2" fill="#ffffff" fill-opacity="0.03" />
    </pattern>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff9d;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#00ff9d;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#00ff9d;stop-opacity:0" />
    </linearGradient>
  </defs>
  <rect width="1200" height="400" fill="url(#scanlines)" />
  <rect width="1200" height="400" fill="url(#glow)" />

  <!-- Voice Waveform Decoration -->
  <g stroke="#00ff9d" stroke-width="2" fill="none" opacity="0.5">
    <polyline points="800,200 820,150 840,250 860,100 880,300 900,180 920,220 940,200" />
    <polyline points="800,210 820,180 840,230 860,150 880,260 900,200 920,210 940,210" opacity="0.3" />
  </g>

  <!-- Main Text -->
  <text x="60" y="180" font-family="monospace" font-size="72" font-weight="bold" fill="#00ff9d" style="text-shadow: 0 0 20px #00ff9d;">
    VOICE TASK MASTER
  </text>
  
  <!-- Version & ID -->
  <text x="60" y="230" font-family="monospace" font-size="24" fill="#ffcc00">
    v1.3.1 // MISSION CONTROL // PROJECT #4322
  </text>

  <!-- Status Indicators -->
  <text x="60" y="320" font-family="monospace" font-size="14" fill="#00ff9d" opacity="0.8">
    &gt; NEURAL UPLINK: CONNECTED
  </text>
  <text x="60" y="345" font-family="monospace" font-size="14" fill="#00ff9d" opacity="0.8">
    &gt; STATUS: GRID SYNCHRONIZED
  </text>
  <text x="60" y="370" font-family="monospace" font-size="14" fill="#00ff9d" opacity="0.8">
    &gt; LOCATION: FLAVORTOWN_PORT_4322
  </text>

  <!-- Decorative Corner Brackets -->
  <path d="M20 20 L100 20 M20 20 L20 100" stroke="#00ff9d" stroke-width="4" fill="none" />
  <path d="M1180 380 L1100 380 M1180 380 L1180 300" stroke="#00ff9d" stroke-width="4" fill="none" />
</svg>
